<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Librairie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 300px;
            object-fit: cover;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">📚 GestionLivre</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center mb-5">Catalogue de Livres</h2>

        <div class="row">
            {% for ele in object_list %}
            <div class="col-12 col-sm-6 col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0">

                    {% if ele.image %}
                        <img src="{{ ele.image.url }}" class="card-img-top" alt="{{ ele.titre }}">
                    {% else %}
                        <img src="https://via.placeholder.com/300x400?text=Pas+d'image" class="card-img-top" alt="Placeholder">
                    {% endif %}

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold">{{ ele.titre }}</h5>
                        <p class="card-text text-muted">
                            <strong>Auteur :</strong> {{ ele.auteur }}<br>
                            <strong>Prix :</strong> <span class="text-success fw-bold">{{ ele.prix }} TND</span>
                        </p>
                        <div class="mt-auto">
                            <a href="{% url 'livre_detail' ele.id %}" class="btn btn-primary w-100">Voir les détails</a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <div class="alert alert-warning text-center">
                    Aucun livre n'a été trouvé dans la base de données.
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
